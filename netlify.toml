# Netlify configuration — pure static site, no build step.
# Netlify reads this automatically; in the UI, leave "Build command" empty.

[build]
  publish = "."

# Sensible security headers for a static site
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Static assets (favicon, OG image, project photos) — cache for a week
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Project write-up PDFs get a short cache so updates show up quickly
[[headers]]
  for = "/docs/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
